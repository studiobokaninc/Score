<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Score — ログイン</title>
<script src="https://cdn.tailwindcss.com"></script>
{# 殿御命 2026-06-10: 全ページ共通デザイン (font + theme + dark) #}
<script>try{ if (localStorage.getItem('score_theme') === 'dark') document.documentElement.classList.add('dark'); }catch(e){}</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/theme.css">
<link rel="stylesheet" href="/static/dark.css">
</head>
<body class="min-h-screen font-sans text-slate-800 bg-gradient-to-br from-[#E0F2FE] via-[#F3E8FF] to-[#FCE7F3]">

{# 殿御命 2026-06-10: 装飾の「ぼかしダッシュボード」背景を除去 (新 cobalt 背景上で変な矩形に見えるため) #}

<!-- Login Overlay -->
<div class="fixed inset-0 z-10 flex flex-col items-center justify-center p-4" style="backdrop-filter: blur(2px);">

  <div class="w-full max-w-md bg-white/40 backdrop-blur-xl border border-white/60 rounded-3xl shadow-xl p-10">

    <!-- Logo -->
    <div class="text-center mb-8">
      <img src="/static/splash.png" alt="Score" class="w-36 h-auto mx-auto select-none" draggable="false">
    </div>

    <!-- Login Form (POST to /api/auth/login) -->
    {% if error %}
    <div class="mb-4 p-3 bg-rose-50 border border-rose-200 rounded-xl text-sm text-rose-700 font-medium text-center">
      {% if error == "user_not_found" %}
      このメールアドレスは登録されていません
      {% else %}
      ログインに失敗しました
      {% endif %}
    </div>
    {% endif %}
    <form method="post" action="/api/auth/login">
      {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}
      <!-- Email -->
      <div class="mb-4">
        <label class="block text-xs font-bold text-slate-500 mb-1 uppercase tracking-widest">メールアドレス</label>
        <input type="email" name="username" placeholder="name@example.com"
          class="w-full bg-white/70 border border-white/80 rounded-xl px-4 py-3 text-slate-800 placeholder-slate-400 outline-none focus:ring-2 focus:ring-indigo-400 transition" />
      </div>

      <!-- Password -->
      <div class="mb-6">
        <label class="block text-xs font-bold text-slate-500 mb-1 uppercase tracking-widest">パスワード</label>
        <input type="password" name="password" placeholder="••••••••"
          class="w-full bg-white/70 border border-white/80 rounded-xl px-4 py-3 text-slate-800 placeholder-slate-400 outline-none focus:ring-2 focus:ring-indigo-400 transition" />
      </div>

      <!-- Login Button -->
      <button type="submit"
        class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-lg shadow-indigo-200 transition-all text-lg mb-6">
        ログイン
      </button>
    </form>

    <!-- Divider -->
    <div class="flex items-center gap-3 mb-6">
      <div class="flex-1 h-px bg-slate-200"></div>
      <span class="text-sm text-slate-400 font-medium">または</span>
      <div class="flex-1 h-px bg-slate-200"></div>
    </div>

    <!-- Google SSO (Phase4 実装予定) -->
    <button class="w-full py-3 bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 font-bold rounded-xl transition-all flex items-center justify-center gap-2 mb-6">
      🔵 <span translate="no">Google</span> アカウントで続ける
    </button>

  </div>


</div>



<!-- Language Modal -->
<div id="language-modal" class="hidden fixed inset-0 bg-black/30 backdrop-blur-sm flex items-center justify-center z-50">
  <div class="bg-white/90 backdrop-blur-xl border border-white/60 rounded-3xl shadow-2xl p-8 max-w-sm w-full mx-4 flex flex-col gap-4">
    <h3 class="font-black text-slate-800 text-lg text-center">🌐 言語を選択</h3>
    <button class="w-full py-3 bg-white border border-slate-200 rounded-2xl font-bold text-slate-700 hover:bg-slate-50 transition-all">繁體中文</button>
    <button class="w-full py-3 bg-indigo-600 text-white rounded-2xl font-bold transition-all">日本語（現在）</button>
    <button class="w-full py-3 bg-white border border-slate-200 rounded-2xl font-bold text-slate-700 hover:bg-slate-50 transition-all">English</button>
    <p class="text-center text-xs text-slate-400">段階的に拡張中</p>
    <button onclick="closeLanguageModal()" class="w-full py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold rounded-2xl transition-all">閉じる</button>
  </div>
</div>

<script>
function openLanguageModal() {
  document.getElementById('language-modal').classList.remove('hidden');
}
function closeLanguageModal() {
  document.getElementById('language-modal').classList.add('hidden');
}
</script>
</body>
</html>
